name: app_habitos
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  
  fonts:
    - family: MuseoModerno
      fonts:
        - asset: assets/fonts/MuseoModerno.otf
        - asset: assets/fonts/MuseoModerno.ttf

    - family: TanMeringue
      fonts:
        - asset: assets/fonts/tanmeringue.otf
        - asset: assets/fonts/tanmeringue.ttf